<!DOCTYPE html>
<html>
    <head>

    </head>
    <body>
        <form>
        <fieldset>
            <legend>Your details</legend>
        <ol>
            <li><label>Name</label>
            <input type="text" placeholder="First and last name">
        </li><br/>
            <li><label>Email</label>
            <input type="email" placeholder="examble@domain.com">
        </li><br/>
            <li><label>Phone</label>
            <input type="text" placeholder="Eg. +447500000000">
        </li>
        </ol>
        </fieldset>
        <fieldset>
        <legend>Delivery address</legend>
        </legend>
        
        <ol>
            <li>
                <label>Address</label>
                <textarea name="text" id="t1"></textarea> 
            </li><br/>
            <li>
                <label>Post code</label>
                <input type="text">
            </li><br/>
            <li>
                <label>Country</label>
                <input type="text">
            </li>
        </ol>
        </fieldset>
        <fieldset>
            <legend>Card details</legend>
            <ol>
                <li>
                    <fieldset>
                        <legend>Card type</legend>
                        <ol>
                            <li>
                                
                                <input type="radio" >
                                <label>VISA</label>
                            </li>
                             <li>
                                
                                <input type="radio" >
                                <label>AmEx</label>
                            </li>
                             <li>
                                
                                <input type="radio" >
                                <label>Mastercard</label>
                            </li>
                        </ol>
                    </fieldset>
                </li><br/>
                <li>
                    <label>Card number</label>
                    <input type="text">
                </li><br/>
                <li>
                    <label>Security code</label>
                    <input type="text">
                </li><br/>
                <li>
                    <label>Name on card</label>
                    <input type="text"placeholder="Exact name as on the card">
                </li>
            </ol>
        </fieldset>
        <fieldset>
            <button type="submit" style="border-radius: 40px;">Buy it!</button>
        </fieldset>
        </form>
    
        </body>
</html>
